<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Recipe Cookbook{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-50 text-slate-800 min-h-screen">
    <nav class="bg-sky-700 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-5 flex items-center justify-between">
            <a href="{% url 'recipe_list' %}" class="text-2xl font-semibold hover:text-sky-200">Recipe Cookbook</a>
            <a href="{% url 'recipe_create' %}" class="px-6 py-3 bg-sky-600 hover:bg-sky-500 rounded-lg text-base font-medium transition">Add Recipe</a>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
