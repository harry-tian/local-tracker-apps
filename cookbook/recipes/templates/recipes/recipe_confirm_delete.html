{% extends "recipes/base.html" %}
{% block title %}Delete {{ recipe.title }} - Recipe Cookbook{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 max-w-lg">
    <h1 class="text-xl font-bold text-slate-800 mb-2">Delete recipe?</h1>
    <p class="text-slate-600 mb-6">Are you sure you want to delete "{{ recipe.title }}"? This cannot be undone.</p>
    <form method="post" class="flex gap-3">
        {% csrf_token %}
        <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium">Delete</button>
        <a href="{% url 'recipe_detail' recipe.pk %}" class="px-6 py-2 text-slate-600 hover:text-slate-800">Cancel</a>
    </form>
</div>
{% endblock %}
